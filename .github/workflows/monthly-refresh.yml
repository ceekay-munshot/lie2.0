# Monthly refresh (Prompt 10) — walk the covered universe and re-score each company.
#
# Sequential by design: the free-tier LLM pool is shared, so companies are processed one at
# a time with backoff between them. Each company goes through the same pipeline + honesty
# guard as process-company.yml, so a quota-truncated run keeps the prior good ledger on main
# (never a downgrade). A monthly commit also keeps the repository active.
#
# Secrets: SCREENER_EMAIL/PASSWORD · OPENAI_API_KEY (paid lead, optional) ·
#          GEMINI/GROQ/MISTRAL_API_KEY (free fallback pool).

name: Monthly refresh

on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of every month
  workflow_dispatch:
    inputs:
      only:
        description: "Optional space-separated ticker subset (default: the whole universe)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: monthly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      ONLY: ${{ github.event.inputs.only }}
      REFRESH: "1"            # re-acquire so new quarters are picked up
      SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
      SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      # Instant-live (KV) — optional; publish-kv is a no-op until all three are set.
      CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
      CF_KV_NAMESPACE_ID: ${{ vars.CF_KV_NAMESPACE_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      LLM_CONCURRENCY: "2"
      DEBUG: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pipeline deps (--no-save) + Chromium
        run: |
          npm i -D ajv ajv-formats unpdf playwright --no-save --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Restore the LLM retrieval cache (whole universe — resume + cut the monthly quota burn)
        # Cache only the per-ticker content-addressed LLM caches (cache/{extract,verify}), never
        # corpus/manifest/raw — so REFRESH=1 still re-acquires each month and picks up new quarters,
        # while unchanged promises reuse last month's retrievals (a changed corpus self-invalidates the
        # keys). One entry covers every ticker the walk touches; a truncated company resumes next month.
        uses: actions/cache/restore@v4
        with:
          path: pipeline/output/*/cache
          key: pipeline-cache-universe-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            pipeline-cache-universe-

      - name: Walk the universe sequentially (guarded commit per company)
        # Step timeout BELOW the 330-min job timeout so the cache-save step below still runs if the walk
        # overruns: a step timeout fails the step but does NOT cancel the job, whereas a job timeout would
        # skip even always() steps and lose every retrieval this run made.
        timeout-minutes: 315
        shell: bash
        run: |
          set -u
          tickers="${ONLY:-$(node -e 'for (const c of require("./pipeline/universe.json")) console.log(c.ticker)')}"
          echo "Refreshing: $(echo $tickers | tr "\n" " ")"
          for t in $tickers; do
            echo "::group::$t"
            # one company at a time; a failure must not stop the walk (the guard kept the prior ledger)
            TICKER="$t" node pipeline/run-pipeline.mjs || echo "::warning::$t failed — prior ledger kept, continuing"
            echo "::endgroup::"
            sleep 30   # polite backoff between companies (free-tier discipline)
          done

      - name: Persist the LLM retrieval cache (whole universe)
        # Saved even if the walk timed out partway, so the companies already retrieved this run resume
        # next month. Unique key per run+attempt; restore-keys above picks up the newest entry.
        if: ${{ always() }}
        uses: actions/cache/save@v4
        with:
          path: pipeline/output/*/cache
          key: pipeline-cache-universe-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Validate every committed ledger against the schema
        if: ${{ always() }}
        run: node pipeline/validate.mjs
