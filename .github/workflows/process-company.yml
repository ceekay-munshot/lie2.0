# Process one company (Prompt 10) — the "any company" entry point.
#
# Runs the full pipeline for a single ticker (acquire → ingest → extract → verify →
# build-report) and commits the result through the P10 honesty guard (lib/commit.mjs):
# a mock/incomplete run never replaces a good ledger on main.
#
# Triggered two ways:
#   - repository_dispatch (type: process-company, client_payload {ticker[, source]}) — the
#     Worker's /api/request/:ticker fires this when a visitor requests an uncovered company.
#   - workflow_dispatch (manual) — ticker + optional source.
#
# Secrets: SCREENER_EMAIL/PASSWORD (acquire) · OPENAI_API_KEY (paid lead, optional) ·
#          GEMINI/GROQ/MISTRAL_API_KEY (free fallback pool). With OPENAI_API_KEY set the
#          run leads with it (no daily cap → completes in one pass); without it, the free
#          pool is used (mistral leads). Optional OPENAI_MODEL overrides gpt-4o-mini.

name: Process company

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Ticker or company name (e.g. INFY)"
        required: true
      source:
        description: "Acquisition backend"
        type: choice
        options: [screener, upload]
        default: screener
      force:
        description: "FORCE=1 — bypass the provenance commit guard (debugging only)"
        type: boolean
        default: false
  repository_dispatch:
    types: [process-company]

permissions:
  contents: write   # the guarded commit pushes the ledger + report to the branch

concurrency:
  # one in-flight run per ticker; a second request for the same ticker queues behind it
  group: process-company-${{ github.event.inputs.ticker || github.event.client_payload.ticker }}
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 90   # a live verify retrieves an actual per in-window promise against free-tier rate limits
    env:
      TICKER: ${{ github.event.inputs.ticker || github.event.client_payload.ticker }}
      SOURCE: ${{ github.event.inputs.source || github.event.client_payload.source || 'screener' }}
      FORCE: ${{ (github.event.inputs.force == 'true' || github.event.client_payload.force) && '1' || '' }}
      SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
      SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      LLM_CONCURRENCY: "2"
      DEBUG: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Guard — a ticker is required
        run: '[ -n "$TICKER" ] || { echo "::error::no ticker supplied (workflow input or dispatch payload)"; exit 1; }'

      - name: Normalize the ticker (lowercase slug — matches pipeline/output/<ticker>/)
        id: t
        run: echo "lc=$(node -e 'process.stdout.write(String(process.env.TICKER||"").trim().toLowerCase())')" >> "$GITHUB_OUTPUT"

      - name: Install pipeline deps (--no-save) + Chromium
        run: |
          npm i -D ajv ajv-formats unpdf playwright --no-save --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Restore the LLM retrieval cache (resume a quota-truncated run)
        # find-actual.mjs writes one cache file per SUCCESSFUL retrieval (a failure writes nothing),
        # keyed by a content signature, so restoring this lets a re-run reuse the prior successes and
        # retry only what failed — a verify truncated by the free-tier daily quota RESUMES instead of
        # repeating every call. We cache ONLY pipeline/output/<ticker>/cache (the content-addressed
        # extract+verify caches), never corpus/manifest/raw: a changed corpus self-invalidates the keys,
        # and acquire/ingest still re-run, so fresh-filing pickup and REFRESH are unaffected.
        uses: actions/cache/restore@v4
        with:
          path: pipeline/output/${{ steps.t.outputs.lc }}/cache
          key: pipeline-cache-${{ steps.t.outputs.lc }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            pipeline-cache-${{ steps.t.outputs.lc }}-

      - name: Run the pipeline (acquire → … → build-report → guarded commit)
        # Step timeout BELOW the 90-min job timeout: if the pipeline overruns, the STEP fails but the
        # JOB is not cancelled, so the cache-save step below still runs (if:always()) and the retrievals
        # made so far survive to resume the next run. A job-level timeout would cancel the job and skip
        # even always() steps, losing the partial cache — the exact case this PR exists to handle.
        timeout-minutes: 80
        run: node pipeline/run-pipeline.mjs

      - name: Persist the LLM retrieval cache (a partial run's successes survive to the next)
        # A guard-refused incomplete run still exits 0, so the new successful retrievals it made are
        # saved on the normal path; `always()` additionally covers an earlier stage aborting (e.g. the
        # pool runs dry mid-verify). The key is unique per run+attempt, so each run writes a fresh entry
        # and the restore step above picks up the newest.
        if: ${{ always() }}
        uses: actions/cache/save@v4
        with:
          path: pipeline/output/${{ steps.t.outputs.lc }}/cache
          key: pipeline-cache-${{ steps.t.outputs.lc }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Validate every committed ledger against the schema
        if: ${{ always() }}
        run: node pipeline/validate.mjs

      - name: Upload artifacts (ledger + promises + corpus)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-${{ github.event.inputs.ticker || github.event.client_payload.ticker }}
          path: |
            public/data/companies/*.json
            public/reports/*.pdf
            pipeline/output/**/promises.json
          if-no-files-found: warn
